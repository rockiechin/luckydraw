name: Update Mark Six Data

on:
  schedule:
    - cron: '0 14 * * 2,4,6,0'
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Forces GitHub to grant write access to this run

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install requests

    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4 selenium

    - name: Run Scraper and Generator
      run: python scraper.py

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated update: Latest results & generated numbers"
        file_pattern: 'data/results.json'
