name: Update Mark Six Data

on:
  schedule:
    # Runs at 14:00 UTC (10:00 PM HKT) on Tue, Thu, Sun
    - cron: '0 14 * * 2,4,0'
  workflow_dispatch: # Allows you to trigger it manually anytime

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial to allow the bot to commit changes back to the repo

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/programs/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install requests

    - name: Run Scraper and Generator
      run: python scraper.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/results.json
        if ! git diff --cached --quiet; then
          git commit -m "Automated update: Latest results & generated numbers"
          git push
        else
          echo "No changes to commit."
        fi
